name: Hourly new-video check (RSS)

on:
  schedule:
    # Every 2 hours, 8am-midnight CET (= 6:45-22:45 UTC)
    - cron: "45 6,8,10,12,14,16,18,20,22 * * *"
  workflow_dispatch: {}

concurrency:
  group: hourly-rss
  cancel-in-progress: false

jobs:
  rss-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run hourly RSS check
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          SUPABASE_URL:    ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:    ${{ secrets.SUPABASE_KEY }}
        run: python scripts/hourly_rss.py
